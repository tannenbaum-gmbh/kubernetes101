# NodePort: exposes the Service on each Node's IP at a static port
# Accessible from outside the cluster via <NodeIP>:<NodePort>
apiVersion: v1
kind: Service
metadata:
  name: nginx-nodeport
spec:
  type: NodePort
  selector:
    app: nginx-backend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080   # Must be in range 30000–32767
