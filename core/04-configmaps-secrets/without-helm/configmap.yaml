# ConfigMap: stores non-sensitive configuration data as key-value pairs
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  APP_ENV: production
  APP_PORT: "8080"
  nginx.conf: |
    server {
      listen 8080;
      location / {
        return 200 'Hello from ConfigMap!\n';
        add_header Content-Type text/plain;
      }
    }
