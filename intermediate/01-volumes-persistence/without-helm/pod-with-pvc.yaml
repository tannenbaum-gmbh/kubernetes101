# Pod mounting a PersistentVolumeClaim
apiVersion: v1
kind: Pod
metadata:
  name: pvc-pod
spec:
  containers:
    - name: app
      image: nginx:1.25
      ports:
        - containerPort: 80
      volumeMounts:
        - mountPath: /usr/share/nginx/html   # Mount point inside the container
          name: data-volume
  volumes:
    - name: data-volume
      persistentVolumeClaim:
        claimName: training-pvc
