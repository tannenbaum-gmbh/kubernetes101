# StatefulSet: manages stateful Pods with stable network identities and storage
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nginx-statefulset
spec:
  serviceName: nginx-headless
  replicas: 3
  selector:
    matchLabels:
      app: nginx-stateful
  template:
    metadata:
      labels:
        app: nginx-stateful
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          volumeMounts:
            - name: data
              mountPath: /usr/share/nginx/html
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 100Mi
---
# Headless Service required by StatefulSet for stable Pod DNS names
apiVersion: v1
kind: Service
metadata:
  name: nginx-headless
spec:
  clusterIP: None    # Headless: no cluster IP, direct Pod DNS
  selector:
    app: nginx-stateful
  ports:
    - port: 80
      targetPort: 80
