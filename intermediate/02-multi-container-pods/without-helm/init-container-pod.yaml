# Init containers run to completion sequentially before main containers start
# Use case: wait for a dependency service to become available
apiVersion: v1
kind: Pod
metadata:
  name: init-demo
spec:
  initContainers:
    - name: wait-for-service
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Waiting for myservice to be available..."
          until nslookup myservice; do
            echo "Service not ready, retrying in 2s..."
            sleep 2
          done
          echo "Service is available!"
    - name: prepare-data
      image: busybox:1.36
      command: ['sh', '-c', 'echo "Data prepared at $(date)" > /data/prepared.txt']
      volumeMounts:
        - name: init-data
          mountPath: /data
  containers:
    - name: main-app
      image: busybox:1.36
      command: ['sh', '-c', 'cat /data/prepared.txt && sleep infinity']
      volumeMounts:
        - name: init-data
          mountPath: /data
  volumes:
    - name: init-data
      emptyDir: {}
