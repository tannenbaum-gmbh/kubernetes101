# Ambassador pattern: proxy that handles external communication on behalf of the main container
apiVersion: v1
kind: Pod
metadata:
  name: ambassador-pod
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ['sh', '-c', 'while true; do wget -qO- http://localhost:8080; sleep 5; done']
    # Ambassador: nginx proxying requests for the app container
    - name: ambassador
      image: nginx:1.25
      ports:
        - containerPort: 8080
