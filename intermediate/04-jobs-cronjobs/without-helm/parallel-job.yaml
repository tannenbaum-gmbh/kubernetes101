# Parallel Job: processes multiple work items concurrently
apiVersion: batch/v1
kind: Job
metadata:
  name: parallel-job
spec:
  completions: 6      # Total successful completions needed
  parallelism: 2      # Run 2 Pods at a time
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: worker
          image: busybox:1.36
          command: ['sh', '-c', 'echo "Processing item $HOSTNAME"; sleep 5; echo "Done"']
