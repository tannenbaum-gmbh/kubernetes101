# Deployment with all three probe types
apiVersion: apps/v1
kind: Deployment
metadata:
  name: probes-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: probes-demo
  template:
    metadata:
      labels:
        app: probes-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          # Startup Probe: checked first, gives the container time to start
          # Kubernetes will not check liveness/readiness until startup succeeds
          startupProbe:
            httpGet:
              path: /
              port: 80
            failureThreshold: 30   # 30 * 2s = 60s max startup time
            periodSeconds: 2

          # Liveness Probe: restarts the container if it fails
          # Use for detecting deadlocks or stuck processes
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 2

          # Readiness Probe: removes the Pod from Service endpoints if it fails
          # Use for detecting temporary unavailability (e.g. during startup or load)
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 1

          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
